name: Update profile art
on:
  schedule:
    - cron: "17 6 * * *"   # daily, 06:17 UTC
  workflow_dispatch: {}
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  heatmap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # Only the lightweight deps — the portrait/info-card libs run locally.
      - run: pip install -r scripts/requirements-ci.txt
      - run: python scripts/fetch_contributions.py
      - run: python scripts/render_heatmap_svg.py
      # Streak card only reads the JSON above — no token needed, so it can
      # refresh daily too. (stats/langs cards need a PAT, so they stay manual.)
      - run: python scripts/make_streak_card.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh contribution graph [skip ci]"
          file_pattern: "data/contributions.json contrib-heatmap.svg streak-card.svg"
